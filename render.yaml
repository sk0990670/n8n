services:
  - type: web
    plan: free
    runtime: image
    name: n8n-service
    image:
      url: docker.io/n8nio/n8n:latest
    envVars:
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      
      - key: DB_TYPE
        value: postgresdb
        
      - key: DB_POSTGRESDB_PORT
        value: "5432"

      # FIXED: The correct variable to enforce SSL for Neon
      - key: DB_POSTGRESDB_SSL_ENABLED
        value: "true"

      - key: DB_POSTGRESDB_HOST
        sync: false
      - key: DB_POSTGRESDB_DATABASE
        sync: false
      - key: DB_POSTGRESDB_USER
        sync: false
      - key: DB_POSTGRESDB_PASSWORD
        sync: false
