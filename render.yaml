services:
  - type: web
    plan: free
    runtime: image
    name: n8n-service
    image:
      url: docker.io/n8nio/n8n:latest
    envVars:
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      
      # Tell n8n to use Postgres
      - key: DB_TYPE
        value: postgresdb
        
      # Database Port (Neon uses the standard Postgres port)
      - key: DB_POSTGRESDB_PORT
        value: "5432"

      # Neon requires SSL for all external connections
      - key: DB_POSTGRESDB_SSL
        value: "true"

      # The following variables are set to 'sync: false'.
      # You will enter their actual values securely in the 
      # Render Dashboard when you deploy.
      - key: DB_POSTGRESDB_HOST
        sync: false
      - key: DB_POSTGRESDB_DATABASE
        sync: false
      - key: DB_POSTGRESDB_USER
        sync: false
      - key: DB_POSTGRESDB_PASSWORD
        sync: false
